<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsukihime</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", serif;

      background:
        radial-gradient(circle at center, rgba(255,220,240,0.5), transparent 50%),
        linear-gradient(180deg, #fffafc, #f7e6f2);

      color: #6b4a5e;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 38px;
      letter-spacing: 0.08em;
    }

    p {
      margin-top: 10px;
      color: #a07a94;
    }

    a {
      display: inline-block;
      margin-top: 30px;
      color: #b58aa5;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Tsukihime</h1>
    <p>ONE FOREST MELODY</p>

    <a href="fairytales.html">←戻る</a>
  </div>
</body>
</html>
